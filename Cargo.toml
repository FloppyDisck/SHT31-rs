[package]
name = "sht31"
description = "A library for the SHT31 temperature and humidity sensor"
version = "0.1.1"
edition = "2021"
license = "MIT"
repository = "https://github.com/FloppyDisck/SHT31-rs"
readme = "README.md"
keywords = ["embedded", "sensor", "temperature", "humidity"]
categories = ["embedded"]

[features]
default = []
esp32-fix = []
no-float = []
robot-rs = ["dep:robotrs"]

[dependencies]
robotrs = {path = "../robotrs", optional = true}
bevy_ecs = { version = "0.9.1", default-features = false }

embedded-svc            = "0.22.0"
embedded-hal            = "0.2.7"

crc = "3.0.0"
thiserror = "1.0.38"

[dev-dependencies]
embedded-hal-mock = "0.9.0"
rstest = "0.16.0"